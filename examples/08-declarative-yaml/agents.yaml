version: 1
agents:
  - object: agent.version
    id: WorkshopFoundryWorkflowResearchAgent:1
    name: WorkshopFoundryWorkflowResearchAgent
    version: "1"
    description: Research agent for the native Foundry workflow lab.
    definition:
      kind: prompt
      model: __MODEL_DEPLOYMENT_NAME__
      instructions: >-
        You are a travel research assistant. Use web search to gather concise,
        recent guidance for city-break planning. Return exactly three short
        bullets.
      tools:
        - type: web_search
          user_location:
            country: NL
            city: Amsterdam
            region: Noord-Holland

  - object: agent.version
    id: WorkshopFoundryWorkflowPackingAgent:1
    name: WorkshopFoundryWorkflowPackingAgent
    version: "1"
    description: Packing agent for the native Foundry workflow lab.
    definition:
      kind: prompt
      model: __MODEL_DEPLOYMENT_NAME__
      instructions: >-
        You are a packing assistant. Use the uploaded gear catalog to recommend
        exactly one item. Base your answer on the scenario and the research
        notes you receive.
      tools:
        - type: file_search
          vector_store_name: WorkshopFoundryWorkflowPackingStore
          files:
            - gear_notes.md