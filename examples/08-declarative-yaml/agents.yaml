version: 1
agents:
  - id: city_researcher
    foundry_name: WorkshopYamlCityResearchAgent
    description: Researches current public guidance for short city trips.
    instructions: >-
      You are a travel research assistant. Use web search to gather concise,
      recent guidance for city-break planning. Return short, factual notes.
    tools:
      - type: web_search
        location:
          country: GB
          city: London
          region: London

  - id: packing_advisor
    foundry_name: WorkshopYamlPackingAdvisorAgent
    description: Recommends exactly one catalog item based on trip conditions.
    instructions: >-
      You are a packing assistant. Use the uploaded gear catalog to recommend
      exactly one item. Base your recommendation on the scenario and the
      research notes you receive.
    tools:
      - type: file_search
        files:
          - gear_notes.md