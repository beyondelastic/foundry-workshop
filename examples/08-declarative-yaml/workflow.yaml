kind: workflow
id: ""
name: Workshop-City-Break-Workflow
description: Recommends one catalog item for a rainy spring city break using a native Foundry workflow.
trigger:
  kind: OnConversationStart
  id: trigger_city_break
  actions:
    - kind: SetVariable
      id: set_trip_scenario
      variable: Local.TripScenario
      value: A participant is planning a three-day rainy spring city break in Amsterdam and wants one gear recommendation from the catalog.

    - kind: InvokeAzureAgent
      id: run_research_agent
      agent:
        name: WorkshopFoundryWorkflowResearchAgent
      conversationId: =System.ConversationId
      input:
        messages: >-
          Scenario: {Local.TripScenario}

          Find recent public guidance for what matters most on this type of trip. Return exactly three bullets.
      output:
        autoSend: false
        messages: Local.ResearchOutputText

    - kind: InvokeAzureAgent
      id: run_packing_agent
      agent:
        name: WorkshopFoundryWorkflowPackingAgent
      conversationId: =System.ConversationId
      input:
        messages: >-
          Scenario: {Local.TripScenario}

          Research notes:
          {Local.ResearchOutputText}

          Using only the uploaded gear catalog, recommend exactly one item. Explain the choice in three bullets and include the price.
      output:
        autoSend: false
        messages: Local.RecommendationOutputText

    - kind: SendActivity
      id: send_final_response
      activity: '{Local.RecommendationOutputText}'

    - kind: EndConversation
      id: end_city_break_workflow